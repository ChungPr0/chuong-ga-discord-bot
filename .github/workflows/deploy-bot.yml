name: Deploy Discord Bot to VPS

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Prepare jar file
        run: mv target/*-jar-with-dependencies.jar ./app.jar

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          source: "app.jar,Dockerfile"
          target: "/opt/discord-bot"

      - name: Docker Build and Run
        uses: appleboy/ssh-action@v1.0.3
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          GUILD_ID: ${{ secrets.GUILD_ID }}
          WELCOME_CHANNEL_ID: ${{ secrets.WELCOME_CHANNEL_ID }}
          ROLES_CHANNEL_ID: ${{ secrets.ROLES_CHANNEL_ID }}
          MUSIC_CHANNEL_ID: ${{ secrets.MUSIC_CHANNEL_ID }}
          CREATE_VOICE_CHANNEL_ID: ${{ secrets.CREATE_VOICE_CHANNEL_ID }}
          INVITE_LINK: ${{ secrets.INVITE_LINK }}
          REACTION_MESSAGE_ID: ${{ secrets.REACTION_MESSAGE_ID }}
          CHICKEN_ROLE_ID: ${{ secrets.CHICKEN_ROLE_ID }}
          BOT_LOG_CHANNEL_ID: ${{ secrets.BOT_LOG_CHANNEL_ID }}
          YOUTUBE_OAUTH_REFRESH_TOKEN: ${{ secrets.YOUTUBE_OAUTH_REFRESH_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          envs: DISCORD_TOKEN,GUILD_ID,WELCOME_CHANNEL_ID,ROLES_CHANNEL_ID,MUSIC_CHANNEL_ID,CREATE_VOICE_CHANNEL_ID,INVITE_LINK,REACTION_MESSAGE_ID,CHICKEN_ROLE_ID,BOT_LOG_CHANNEL_ID,YOUTUBE_OAUTH_REFRESH_TOKEN
          script: |
            cd /opt/discord-bot
            
            echo "DISCORD_TOKEN=$DISCORD_TOKEN" > .env
            echo "GUILD_ID=$GUILD_ID" >> .env
            echo "WELCOME_CHANNEL_ID=$WELCOME_CHANNEL_ID" >> .env
            echo "ROLES_CHANNEL_ID=$ROLES_CHANNEL_ID" >> .env
            echo "MUSIC_CHANNEL_ID=$MUSIC_CHANNEL_ID" >> .env
            echo "CREATE_VOICE_CHANNEL_ID=$CREATE_VOICE_CHANNEL_ID" >> .env
            echo "INVITE_LINK=$INVITE_LINK" >> .env
            echo "REACTION_MESSAGE_ID=$REACTION_MESSAGE_ID" >> .env
            echo "CHICKEN_ROLE_ID=$CHICKEN_ROLE_ID" >> .env
            echo "BOT_LOG_CHANNEL_ID=$BOT_LOG_CHANNEL_ID" >> .env
            echo "YOUTUBE_OAUTH_REFRESH_TOKEN=$YOUTUBE_OAUTH_REFRESH_TOKEN" >> .env

            sudo docker stop discord-bot-container || true
            sudo docker rm discord-bot-container || true
            sudo docker build -t discord-bot-image .
            sudo docker run -d \
              --name discord-bot-container \
              --env-file .env \
              --dns 8.8.8.8 \
              --dns 1.1.1.1 \
              -v /opt/discord-bot:/opt/discord-bot \
              --restart unless-stopped \
              discord-bot-image
            
            sudo docker system prune -a --volumes -f