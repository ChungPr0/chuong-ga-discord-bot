name: Deploy Discord Bot to VPS

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Prepare jar file
        # Lấy file có đuôi -jar-with-dependencies do plugin assembly tạo ra
        run: mv target/*-jar-with-dependencies.jar ./app.jar

      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          source: "app.jar,Dockerfile"
          target: "/opt/discord-bot"

      - name: Docker Build and Run
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd /opt/discord-bot
            
            # TỰ ĐỘNG TẠO FILE .env TỪ GITHUB SECRETS
            echo "DISCORD_TOKEN=${{ secrets.DISCORD_TOKEN }}" > .env
            echo "GUILD_ID=${{ secrets.GUILD_ID }}" >> .env
            echo "WELCOME_CHANNEL_ID=${{ secrets.WELCOME_CHANNEL_ID }}" >> .env
            echo "ROLES_CHANNEL_ID=${{ secrets.ROLES_CHANNEL_ID }}" >> .env
            echo "MUSIC_CHANNEL_ID=${{ secrets.MUSIC_CHANNEL_ID }}" >> .env
            echo "INVITE_LINK=${{ secrets.INVITE_LINK }}" >> .env
            echo "REACTION_MESSAGE_ID=${{ secrets.REACTION_MESSAGE_ID }}" >> .env
            echo "CHICKEN_ROLE_ID=${{ secrets.CHICKEN_ROLE_ID }}" >> .env

            # Build image
            sudo docker build -t discord-bot-image .
            
            # Dừng và xóa container cũ nếu có
            sudo docker rm -f discord-bot-container || true
            
            # Chạy container mới
            sudo docker run -d \
              --name discord-bot-container \
              --env-file .env \
              --restart unless-stopped \
              discord-bot-image
            
            # Dọn dẹp rác Docker
            sudo docker image prune -f